<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body style="height: 300vh;">
    <section class="scroll-section mt-[400px]">
      <h2
        class="scroll-reveal opacity-0 translate-y-8 transition-all duration-[900ms] ease-out text-5xl md:text-7xl font-light tracking-tight"
      >
        Save from anywhere <br />
        with our extensions
      </h2>

      <div class="flex gap-4 mt-8">
        <button
          class="scroll-reveal opacity-0 translate-y-8 transition-all duration-[900ms] ease-out px-5 py-2 rounded-full border border-white/20 text-white/90 backdrop-blur-sm hover:border-white/40"
        >
          <i class="fab fa-chrome"></i> Chrome
        </button>

        <button
          class="scroll-reveal opacity-0 translate-y-8 transition-all duration-[900ms] ease-out px-5 py-2 rounded-full border border-white/20 text-white/90 backdrop-blur-sm hover:border-white/40"
        >
          <i class="fab fa-safari"></i> Safari
        </button>

        <button
          class="scroll-reveal opacity-0 translate-y-8 transition-all duration-[900ms] ease-out px-5 py-2 rounded-full border border-white/20 text-white/90 backdrop-blur-sm hover:border-white/40"
        >
          <i class="fab fa-apple"></i> iOS
        </button>
      </div>
    </section>
  </body>
  <script>
    const revealElements = document.querySelectorAll(".scroll-reveal");

    function scrollReveal() {
      revealElements.forEach((el, i) => {
        const rect = el.getBoundingClientRect();
        const isVisible = rect.top < window.innerHeight - 100;

        if (isVisible) {
          setTimeout(() => {
            el.classList.remove("opacity-0", "translate-y-8");
            el.classList.add("opacity-100", "translate-y-0");
          }, i * 150); // stagger animation like COSMOS (~150ms)
        }
      });
    }

    window.addEventListener("scroll", scrollReveal);
    scrollReveal();
  </script>
</html>
