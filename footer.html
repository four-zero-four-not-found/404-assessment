<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Archives - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .image-card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .social-icon {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            grid-auto-flow: dense;
        }

        .masonry-item-tall {
            grid-row: span 2;
        }

        .masonry-item-wide {
            grid-column: span 2;
        }
    </style>
</head>
<body class="bg-neutral-950 text-white min-h-screen">
    <!-- Header Section -->
    <header class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-serif mb-4">Ethereal Archives</h1>
            <p class="text-gray-400 mb-6">
                700 Followers • By @aurora 
                <svg class="inline w-4 h-4 ml-1" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
                </svg>
            </p>
            
            <!-- Profile Image -->
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 rounded-full bg-gray-700 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&h=200&fit=crop" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
            
            <!-- Follow Button -->
            <button class="px-8 py-3 bg-white text-black rounded-full font-medium hover:bg-gray-200 transition">
                Follow
            </button>
        </div>
    </header>
