<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Vintage Pinterest Style</title>
</head>
<body class="bg-[#d8c7b3] text-[#3b2b20]">
  <!-- Header -->
  <header class="w-full border-b border-[#c2aa84] bg-[#e0d1b8] py-4 shadow">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-4">
      <h1 class="text-2xl font-bold tracking-[0.2em] uppercase">Vintage Board</h1>
      <input
        type="text"
        placeholder="Search inspirations..."
        class="px-3 py-1 border border-[#c2aa84] bg-[#d9cdb9] text-sm focus:outline-none shadow"
      />
    </div>
  </header>

  <!-- Masonry Grid -->
  <main class="max-w-6xl mx-auto mt-6 px-4">
    <div class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 [column-fill:_balance]"></div>
    <script>
      const container = document.querySelector('.columns-1');
      const images = [
        'https://via.placeholder.com/400x500',
        'https://via.placeholder.com/400x300',
        'https://via.placeholder.com/400x600',
        'https://via.placeholder.com/400x350',
        'https://via.placeholder.com/400x450',
        'https://via.placeholder.com/400x550',
        'https://via.placeholder.com/400x320',
        'https://via.placeholder.com/400x700'
      ];

      images.forEach(src => {
        const card = document.createElement('div');
        card.className = 'mb-4 break-inside-avoid border border-[#c2aa84] bg-[#e0d1b8] shadow-md';

        card.innerHTML = `
          <img src="${src}" class="w-full object-cover border-b border-[#c2aa84]" />
          <div class="p-3">
            <h2 class="text-sm uppercase font-semibold tracking-[0.15em] mb-1">Vintage Post</h2>
            <p class="text-[12px] leading-relaxed">A nostalgic piece capturing timeless aesthetics.</p>
          </div>
        `;

        container.appendChild(card);
      });
    </script>
  </main>

  <!-- Footer -->
  <footer class="mt-10 py-4 text-center text-xs uppercase tracking-[0.2em] border-t border-[#c2aa84] bg-[#e0d1b8]">
    Vintage Pinterest Style • Crafted with TailwindCSS
  </footer>
</body>
</html>
