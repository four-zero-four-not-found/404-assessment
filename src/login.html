<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dist/output.css">
    <link rel="stylesheet" href="../src/style.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.0.24/dist/tailwind.min.css" rel="stylesheet">
    

</head>
<body>
    <!-- background -->
    <body class="bg-cover bg-center h-screen flex justify-center items-center relative overflow-hidden backdrop-blur-lg" 
    style="background-image: url('https://i.pinimg.com/736x/33/c4/dc/33c4dcfd9ae9b3d102b4eca8124fe5bd.jpg');">

        <!-- header -->
    <div class="bg-white/20 backdrop-blur-md rounded-[30px] p-8 w-[350px] shadow-xl">
        <div class=" text-center ">
            <h1 class="login text-3xl font-bold text-black">Welcome Back!</h1> 
            <h1 class="login text-lg text-black mt-3">Please Log In to your account</h1>

            <!-- input -->
              <div>
                    <label for="email" class="block text-left text-sm font-medium text-black px-4 py-1 mt-6 ">
                        Username 
                    </label>
                    <input 
                        type="email" 
                        id="email"
                        placeholder="Username or Email"
                        class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"/>
                </div>
                <div>
                    <label for="email" class="block text-left text-sm font-medium text-black px-4 py-1 mt-6">
                        Password
                    </label>
                    <input 
                        type="email" 
                        id="email"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"/>
                </div>
            
            <!-- remember and forgot password -->
        <div class="flex items-center text-sm justify-between px-1 py-1 mt-4">
            <label class="flex items-center">
                <input type="checkbox" class="w-4 h-4 rounded border-white/30 bg-white/20 text-white focus:ring-white/50">
                <span class="ml-2 text-sm text-white">Remember Me</span>
            </label>
                <p class="text-right ">
                    <a href="../src/forgotpass.html" class=" text-white text-sm ml-2 hover:underline">Forgot Password?</a>
                </p>
            </div>
        </div>
        

        <!-- button login -->
        <div class="text-center font-bold mt-4 py-5 px-1">
            <button class="w-full py-3 px-4 rounded-full bg-gray-500 text-white text-md cursor-pointer transition-transform duration-300 hover:scale-105 hover:bg-black">
                Login
            </button>
        </div>
        <p class="text-white text-center px-3 py-1 mb-2 mt-6">Or sign in with</p>


        <!-- button signin with -->
        <div class="flex justify-center gap-4">
        <!-- Google Button -->
            <button 
                type="button"
                class="group w-12 h-12 px-3 py-3 rounded-full text-black bg-white/20 backdrop-blur-sm border border-white/30 hover:bg-black transition flex items-center justify-center transform hover:scale-105 duration-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path class="fill-white group-hover:fill-[#4285F4] transition-colors duration-200" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path class="fill-white group-hover:fill-[#34A853] transition-colors duration-200" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path class="fill-white group-hover:fill-[#FBBC05] transition-colors duration-200" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path class="fill-white group-hover:fill-[#EA4335] transition-colors duration-200" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
            <style>
                    .group:hover svg path:nth-child(1) { fill: #4285F4; }
                    .group2:hover svg path:nth-child(1) { fill: #ffffff; }
                    .group:hover svg path:nth-child(2) { fill: #34A853; }
                    .group:hover svg path:nth-child(3) { fill: #FBBC05; }
                    .group:hover svg path:nth-child(4) { fill: #EA4335; }
            </style>
        </button>
            <!-- GitHub Button -->
            <button 
                type="button"
                class="group2 w-12 h-12 px-3 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 hover:bg-black transition flex items-center justify-center transform hover:scale-110 duration-200">
                <svg class="w-5 h-5 text-white group-hover:text-black transition" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </button>
        </div>
    </form>
    <div class="text-center"> 
        <p class="text-black mt-4">Don't have an account? <a href="../src/signup.html" 
            class="text-blue-500 hover:underline">SignUp Now <a><p>
    </div>
</div>

</body>
</html>
