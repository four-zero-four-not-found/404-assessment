<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FotoMood</title>
    <link rel="stylesheet" href="../dist/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="font-['Oswald']"
    style="
      background-image: url(../src/assets/img/record-player_gif.gif);
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    "
  >
    <div class="container max-w-[1200px] mx-auto">
    
      <nav class="w-full text-[#ECECEC] flex items-center justify-between mt-2 px-4">
        
      
        <div class="flex items-center space-x-3">
          <div class="flex flex-col">
            <h1 class="text-[28px] md:text-[35px] font-bold">FotoMood</h1>
            <span class="text-[11px] md:text-[13px] font-bold -mt-2">
              just do what you love...
            </span>
          </div>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center space-x-6 text-[16px] md:text-[20px] font-bold">
          <a href="#" class="hover:underline transition-all duration-300">About</a>
          <a href="#" class="hover:underline">Businesses</a>
          <a href="#" class="hover:underline">Create</a>
          <a href="#" class="hover:underline">News</a>

          <!-- Buttons -->
          <div class="text-white space-x-2">
            <button
              class="bg-[#4B352A] hover:bg-[#583b2d] text-white px-5 py-2 rounded-full transition-all duration-200"
            >
              Login
            </button>
            <button
              class="bg-[#4B352A] font-bold hover:bg-[#583b2d] text-white px-4 py-2 rounded-full transition-all duration-200"
            >
              Sign up
            </button>
          </div>
        </div>

        <!-- Hamburger Menu (Mobile Only) -->
        <button id="menu-btn" class="md:hidden text-white text-3xl focus:outline-none">
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>

      <!-- MOBILE MENU -->
      <div id="mobile-menu" class="hidden md:hidden bg-[#2d2220]/70 backdrop-blur-md mt-4 p-4 rounded-lg text-white space-y-3">
        <a href="#" class="block text-lg font-semibold">About</a>
        <a href="#" class="block text-lg font-semibold">Businesses</a>
        <a href="#" class="block text-lg font-semibold">Create</a>
        <a href="#" class="block text-lg font-semibold">News</a>

        <div class="pt-3 space-y-3">
          <button class="w-full border border-gray-300 py-2 rounded-full hover:bg-gray-100 hover:text-black">
            Login
          </button>
          <button class="w-full bg-[#4B352A] py-2 rounded-full hover:bg-[#583b2d]">
            Sign up
          </button>
        </div>
      </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="w-full max-w-xl mx-auto px-4 mt-[150px] md:mt-[200px] screen2000:mt-[450px]">
      <div class="flex items-center bg-white border border-gray-300 rounded-full overflow-hidden shadow-sm">
        <input
          type="text"
          placeholder="Search your memories..."
          class="w-full px-5 py-4 md:py-5 text-sm focus:outline-none"
        />
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-[40px] md:text-[60px] font-bold h-10 text-center text-white mt-6">
      Get your next!
    </div>

    <!-- ANIMATED TEXT -->
    <div class="h-[80px] md:h-[100px] overflow-hidden text-center text-white mt-[20px] md:mt-[30px]">
      <span
        id="fadeText"
        class="inline-block text-[40px] md:text-[60px] font-bold animate-fadeUp"
      ></span>
    </div>

    <script>
      const messages = [
        "Welcome to my website!",
        "weeknight dinner idea",
        "Vintage idea.",
      ];

      let i = 0;
      const el = document.getElementById("fadeText");

      function showText() {
        el.classList.remove("animate-fadeUp");
        void el.offsetWidth;
        el.textContent = messages[i];
        el.classList.add("animate-fadeUp");

        i = (i + 1) % messages.length;
      }

      showText();
      setInterval(showText, 2500);

      // MOBILE MENU TOGGLE
      const menu = document.getElementById("mobile-menu");
      const menuBtn = document.getElementById("menu-btn");

      menuBtn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });
    </script>
  </body>
</html>
