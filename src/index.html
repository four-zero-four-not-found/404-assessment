    <script>
      const words = ["designers", "developers", "artists", "creators"];
      let index = 0;

      const el = document.getElementById("swapText");

      function swapWord() {
        // Fade out
        el.style.opacity = 0;

        setTimeout(() => {
          // Change text
          index = (index + 1) % words.length;
          el.textContent = words[index];

          // Fade back in
          el.style.opacity = 1;
        }, 700); // matches Tailwind fade duration
      }

      // Change every 2.5 seconds
      setInterval(swapWord, 2500);

      // MOBILE MENU TOGGLE
      const menu = document.getElementById("mobile-menu");
      const menuBtn = document.getElementById("menu-btn");

      menuBtn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });

      //scroll animation
      const revealElements = document.querySelectorAll(".scroll-reveal");

      function scrollReveal() {
        revealElements.forEach((el, i) => {
          const rect = el.getBoundingClientRect();
          const isVisible = rect.top < window.innerHeight - 100;

          if (isVisible) {
            setTimeout(() => {
              el.classList.remove("opacity-0", "translate-y-8");
              el.classList.add("opacity-100", "translate-y-0");
            }, i * 150); // stagger animation like COSMOS (~150ms)
          }
        });
      }

      window.addEventListener("scroll", scrollReveal);
      scrollReveal();
    </script>
