<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Smythe&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../dist/output.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@3.0.24/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-cover bg-center h-screen flex justify-center items-center relative overflow-hidden backdrop-blur-lg"
    style="
      background-image: url('https://i.pinimg.com/736x/33/c4/dc/33c4dcfd9ae9b3d102b4eca8124fe5bd.jpg');
    "
  >
    <!-- header -->
    <div
      class="bg-white/20 backdrop-blur-md rounded-[30px] p-8 w-[400px] shadow-xl"
    >
      <div class="text-center">
        <h1 class="login text-3xl font-bold text-black">Forgot Password?</h1>
        <p class="login text-lg text-black mt-3">
          No worries, we'll send you reset instructions
        </p>
      </div>

      <!-- input -->
      <form class="mt-4">
        <div>
          <label
            for="email"
            class="block text-left text-sm font-medium text-black px-4 py-1 mt-6"
          >
            Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email or PhoneNumber"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"
          />
        </div>

        <div>
          <label
            for="login-code"
            class="block text-left text-sm font-medium text-black px-4 py-1 mt-6"
          >
            LogIn Code
          </label>
          <input
            type="text"
            id="login-code"
            name="login-code"
            placeholder="Enter code"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"
          />
        </div>

        <div>
          <label
            for="new-password"
            class="block text-left text-sm font-medium text-black px-4 py-1 mt-6"
          >
            New Password
          </label>
          <input
            type="password"
            id="new-password"
            name="new-password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"
          />
        </div>

        <div>
          <label
            for="confirm-password"
            class="block text-left text-sm font-medium text-black px-4 py-1 mt-6"
          >
            Confirm Password
          </label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"
          />
        </div>

        <!-- buttons -->
        <div class="text-center font-bold py-5 px-1 mt-8">
          <button
            type="button"
            class="w-full py-3 px-4 rounded-full bg-gray-500 text-white text-md cursor-pointer transition-transform duration-300 hover:scale-105 hover:bg-black"
          >
            Send Again
          </button>
        </div>

        <div class="text-center font-bold py-3">
          <button
            type="submit"
            class="w-full py-3 px-4 rounded-full bg-gray-500 text-white text-md cursor-pointer transition-transform duration-300 hover:scale-105 hover:bg-black"
          >
            Done
          </button>
        </div>

        <div class="text-center">
          <p class="text-black mt-4">
            Back to LogIn?
            <a href="../src/login.html" class="text-blue-500 hover:underline"
              >Log In</a
            >
          </p>
        </div>
      </form>
    </div>
  </body>
</html>
