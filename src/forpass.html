<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../dist/output.css">
<body>
    <!-- background -->
    <body class="bg-cover bg-center h-screen flex justify-center items-center relative overflow-hidden backdrop-blur-lg" style="background-image: url('https://i.pinimg.com/736x/33/c4/dc/33c4dcfd9ae9b3d102b4eca8124fe5bd.jpg');">

    <!-- header -->
    <div class="bg-white/20 backdrop-blur-md rounded-[30px] p-8 w-[350px] shadow-xl">
        <div class="text-center">
            <h1 class="login text-3xl font-bold text-black">Forgot Password?</h1> 
            <h1 class="login text-lg text-black mt-3">No worries, we'll send you reset instructions</h1>

    <!-- input -->
    <div>
        <label for="email" class="block text-left text-sm font-medium text-black px-4 py-1 mt-6 ">
            Email 
        </label>
        <input 
            type="email" 
            id="email"
            placeholder="Email or PhoneNumber"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"/>
    </div>
    <div>
        <label for="email" class="block text-left text-sm font-medium text-black px-4 py-1 mt-6 ">
            LogIn Code
        </label>
        <input 
            type="email" 
            id="email"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"/>
    </div>
    <div>
        <label for="email" class="block text-left text-sm font-medium text-black px-4 py-1 mt-6 ">
            New Password
        </label>
        <input 
            type="email" 
            id="email"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"/>
    </div>
    <div>
        <label for="email" class="block text-left text-sm font-medium text-black px-4 py-1 mt-6 ">
            Confirm Password
        </label>
        <input 
            type="email" 
            id="email"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition"/>
        </div>
    </div>
        

    <!-- button send again -->
    <div class="text-center font-bold py-5 px-1 mt-8 ">
        <button class="w-full py-3 px-4 rounded-full bg-gray-500 text-white text-md cursor-pointer transition-transform duration-300 hover:scale-105 hover:bg-black">
            Send Again
        </button>
    <div class="text-center font-bold py-3 ">
        <button class="w-full py-3 px-4 rounded-full bg-gray-500 text-white text-md cursor-pointer transition-transform duration-300 hover:scale-105 hover:bg-black">
            Done
        </button>
    </div>
    <div class="text-center"> 
        <p class="text-black mt-4">Back to LogIn? <a href="../src/login.html" class="text-blue-500 hover:underline">Log In <a><p>
    </div>
</div>

</body>
</html>
