<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMOS - Resurface your elements instantly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .heading-font {
            font-family: 'Playfair Display', serif;
        }
        
        .image-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .image-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">


    <!-- Main Content -->
    <main class="min-h-screen pt-32 pb-20 px-8">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-12 gap-12">
                <!-- Left Content -->
                <div class="col-span-5 flex flex-col justify-center pr-8">
                    <h1 class="heading-font text-6xl leading-tight mb-6 gradient-text">
                        Resurface your elements instantly
                    </h1>
                    <p class="text-gray-400 text-lg leading-relaxed">
                        Find anything in your library with ease. Your Cosmos is an intelligent sanctuary of information, ready to be searched and resurfaced.
                    </p>
                </div>

                <!-- Right Gallery Grid -->
                <div class="col-span-7 relative">
                    <div class="relative w-full" style="height: 900px;">
                        <!-- Image 1 - Top Left -->
                        <div class="image-card absolute top-0 left-0 w-56 h-80 rounded-2xl overflow-hidden">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 224 320'%3E%3Crect fill='%23e8e8e8' width='224' height='320'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-size='12' fill='%23333'%3EISSEY MIYAKE%3C/text%3E%3C/svg%3E" alt="Fashion 1" class="w-full h-full object-cover">
                        </div>

                        <!-- Image 2 - Top Right -->
                        <div class="image-card absolute top-0 right-0 w-80 h-64 rounded-2xl overflow-hidden">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 256'%3E%3Crect fill='%23b8b8b8' width='320' height='256'/%3E%3Cpath d='M 40 128 Q 160 40, 280 128' stroke='%23606060' stroke-width='3' fill='none'/%3E%3Cpath d='M 50 100 Q 160 60, 270 100' stroke='%23707070' stroke-width='2' fill='none'/%3E%3C/svg%3E" alt="Sculpture" class="w-full h-full object-cover">
                        </div>

                        <!-- Search Bar - Center -->
                        <div class="absolute z-30 left-1/2 top-96 transform -translate-x-1/2 w-96">
                            <div class="bg-gray-800 bg-opacity-90 backdrop-blur-xl rounded-full px-6 py-4 flex items-center gap-3 shadow-2xl border border-gray-700">
                                <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                                <input type="text" placeholder="issey miyake" class="bg-transparent flex-1 outline-none text-white placeholder-gray-400 text-base">
                                <kbd class="px-2.5 py-1 text-xs bg-gray-700 rounded border border-gray-600 text-gray-300 font-mono">/</kbd>
                            </div>
                        </div>

                        <!-- Image 3 - Bottom Left -->
                        <div class="image-card absolute bottom-0 left-0 w-52 h-64 rounded-2xl overflow-hidden">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 208 256'%3E%3Crect fill='%2398c8e8' width='208' height='256'/%3E%3Cpath d='M 104 80 L 80 140 L 128 140 Z' fill='%232a2a2a'/%3E%3Cellipse cx='104' cy='60' rx='30' ry='15' fill='%23404040'/%3E%3C/svg%3E" alt="Fashion 2" class="w-full h-full object-cover">
                        </div>

                        <!-- Image 4 - Middle Right -->
                        <div class="image-card absolute top-72 right-0 w-56 h-64 rounded-2xl overflow-hidden">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 224 256'%3E%3Crect fill='%23f4f4f4' width='224' height='256'/%3E%3Cellipse cx='112' cy='128' rx='60' ry='80' fill='%23c0c0c0'/%3E%3Cellipse cx='112' cy='140' rx='40' ry='60' fill='%23d8d8d8'/%3E%3C/svg%3E" alt="Fashion 3" class="w-full h-full object-cover">
                        </div>

                        <!-- Image 5 - Bottom Center -->
                        <div class="image-card absolute bottom-0 left-48 w-56 h-60 rounded-2xl overflow-hidden">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 224 240'%3E%3Crect fill='%23c8c8c8' width='224' height='240'/%3E%3Ccircle cx='112' cy='100' r='50' fill='%23888' opacity='0.5'/%3E%3Ccircle cx='112' cy='140' r='60' fill='%239a9a9a' opacity='0.4'/%3E%3C/svg%3E" alt="Fashion 4" class="w-full h-full object-cover">
                        </div>

                        <!-- Image 6 - Bottom Right -->
                        <div class="image-card absolute bottom-0 right-0 w-52 h-64 rounded-2xl overflow-hidden">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 208 256'%3E%3Crect fill='%23a8c8e8' width='208' height='256'/%3E%3Cellipse cx='104' cy='128' rx='70' ry='90' fill='%234682B4' opacity='0.6'/%3E%3Crect x='70' y='80' width='68' height='20' rx='10' fill='%23305070' opacity='0.8'/%3E%3C/svg%3E" alt="Art" class="w-full h-full object-cover">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>


</body>
</html>
