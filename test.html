<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save from Anywhere - Cosmic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(300px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(300px) rotate(-360deg); }
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
        }
        
        .image-card {
            animation: float 6s ease-in-out infinite;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .platform-btn {
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
                        .platform-btn:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-black overflow-hidden">
    <!-- Cosmic Background -->
    <div class="fixed inset-0 bg-gradient-to-b from-black via-zinc-950 to-black">
        <!-- Nebula clouds -->
        <div class="nebula w-96 h-96 bg-gray-400 top-20 left-10"></div>
        <div class="nebula w-80 h-80 bg-gray-500 top-40 right-20"></div>
        <div class="nebula w-72 h-72 bg-gray-600 bottom-20 left-1/3"></div>
        
        <!-- Stars -->
        <div id="stars"></div>
    </div>
    
    <!-- Main Content -->
    <div class="relative min-h-screen flex flex-col items-center justify-center p-8">
        <!-- Floating Images Grid -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <!-- Top Left -->
            <div class="image-card absolute top-10 left-10 w-48 h-64 bg-gradient-to-br from-gray-900/30 to-transparent rounded-lg overflow-hidden" style="animation-delay: 0s;">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=600&fit=crop" alt="Mountain landscape" class="w-full h-full object-cover opacity-70">
                <div class="absolute bottom-4 left-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <span class="text-white text-sm">📷</span>
                </div>
            </div>
            
            <!-- Top Right -->
            <div class="image-card absolute top-20 right-16 w-56 h-56 bg-gradient-to-br from-gray-800/30 to-transparent rounded-lg overflow-hidden" style="animation-delay: 1s;">
                <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=500&h=500&fit=crop" alt="Stars" class="w-full h-full object-cover opacity-70">
                <div class="absolute bottom-4 right-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <span class="text-white text-sm">🐦</span>
                </div>
            </div>
            
            <!-- Bottom Left -->
            <div class="image-card absolute bottom-20 left-16 w-64 h-48 bg-gradient-to-br from-gray-700/30 to-transparent rounded-lg overflow-hidden" style="animation-delay: 2s;">
                <img src="https://images.unsplash.com/photo-1464802686167-b939a6910659?w=600&h=400&fit=crop" alt="Mountain peak" class="w-full h-full object-cover opacity-70">
                <div class="absolute top-4 left-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <span class="text-white text-sm">📌</span>
                </div>
            </div>
            
            <!-- Bottom Right -->
            <div class="image-card absolute bottom-16 right-20 w-52 h-72 bg-gradient-to-br from-gray-900/30 to-transparent rounded-lg overflow-hidden" style="animation-delay: 3s;">
                <img src="https://images.unsplash.com/photo-1502134249126-9f3755a50d78?w=400&h=700&fit=crop" alt="Night sky" class="w-full h-full object-cover opacity-70">
                <div class="absolute bottom-4 right-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <span class="text-white text-sm">📷</span>
                </div>
            </div>
            
            <!-- Center Left -->
            <div class="image-card absolute top-1/3 left-32 w-44 h-56 bg-gradient-to-br from-gray-800/30 to-transparent rounded-lg" style="animation-delay: 1.5s;">
                <div class="absolute bottom-4 left-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <span class="text-white text-sm">📌</span>
                </div>
            </div>
            
            <!-- Center Right Top -->
            <div class="image-card absolute top-32 right-40 w-48 h-60 bg-gradient-to-br from-gray-700/30 to-transparent rounded-lg" style="animation-delay: 2.5s;">
                <div class="absolute top-4 right-4 w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <span class="text-white text-sm">📷</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content Card -->
        <div class="relative z-10 text-center max-w-4xl">
            <!-- Title -->
            <h1 class="text-6xl md:text-7xl font-serif text-white mb-6 tracking-tight">
                Save from anywhere
            </h1>
            <p class="text-4xl md:text-5xl font-serif text-white/90 mb-16">
                with our extensions
            </p>
            
            <!-- Platform Buttons -->
            <div class="flex items-center justify-center gap-6">
                <!-- Chrome -->
                <button class="platform-btn w-20 h-20 rounded-full bg-white/10 flex items-center justify-center group">
                    <svg class="w-10 h-10 text-white group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C8.21 0 4.831 1.757 2.632 4.501l3.953 6.848A5.454 5.454 0 0 1 12 6.545h10.691A12 12 0 0 0 12 0zM1.931 5.47A11.943 11.943 0 0 0 0 12c0 6.012 4.42 10.991 10.189 11.864l3.953-6.847a5.45 5.45 0 0 1-6.865-2.29zm13.342 2.166a5.446 5.446 0 0 1 1.45 7.09l.002.001h-.002l-5.344 9.257c.206.01.413.016.621.016 6.627 0 12-5.373 12-12 0-1.54-.29-3.011-.818-4.364zM12 16.364a4.364 4.364 0 1 1 0-8.728 4.364 4.364 0 0 1 0 8.728z"/>
                    </svg>
                </button>
                
                <!-- Safari -->
                <button class="platform-btn w-20 h-20 rounded-full bg-white/10 flex items-center justify-center group">
                    <svg class="w-10 h-10 text-white group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 24C5.373 24 0 18.627 0 12S5.373 0 12 0s12 5.373 12 12-5.373 12-12 12zm0-1.5c5.799 0 10.5-4.701 10.5-10.5S17.799 1.5 12 1.5 1.5 6.201 1.5 12 6.201 22.5 12 22.5zM12 2.25A9.75 9.75 0 1 0 12 21.75 9.75 9.75 0 0 0 12 2.25zM11.691 6.75l5.468 8.109-5.468 2.391-5.468-8.109z"/>
                    </svg>
                </button>
                
                <!-- iOS/Apple -->
                <button class="platform-btn w-20 h-20 rounded-full bg-white/10 flex items-center justify-center group">
                    <svg class="w-10 h-10 text-white group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                    </svg>
                </button>
            </div>
            
            <!-- Labels -->
            <div class="flex items-center justify-center gap-6 mt-4">
                <span class="text-white/60 text-sm font-medium w-20">Chrome</span>
                <span class="text-white/60 text-sm font-medium w-20">Safari</span>
                <span class="text-white/60 text-sm font-medium w-20">iOS</span>
            </div>
        </div>
        
        <!-- Dark Mode Toggle (Optional) -->
        <button class="fixed bottom-8 left-8 w-12 h-12 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/20 hover:bg-white/20 transition-all">
            🌙
        </button>
    </div>
    
    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }
        
        // Add some shooting stars occasionally
        setInterval(() => {
            if (Math.random() > 0.8) {
                const shootingStar = document.createElement('div');
                shootingStar.style.position = 'absolute';
                shootingStar.style.width = '100px';
                shootingStar.style.height = '2px';
                shootingStar.style.background = 'linear-gradient(90deg, transparent, white, transparent)';
                shootingStar.style.top = Math.random() * 50 + '%';
                shootingStar.style.left = '-100px';
                shootingStar.style.transform = 'rotate(-45deg)';
                shootingStar.style.animation = 'shooting 1s ease-out forwards';
                document.body.appendChild(shootingStar);
                
                setTimeout(() => shootingStar.remove(), 1000);
            }
        }, 3000);
        
        // Add shooting star animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shooting {
                to {
                    left: 120%;
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
